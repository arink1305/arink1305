<svg width="1280" height="430" viewBox="0 0 1280 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stackBg" x1="0" y1="0" x2="1280" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="1" stop-color="#18233F"/>
    </linearGradient>
    <linearGradient id="javaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="pythonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="kotlinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <style>
      .floatA { animation: floatA 8s ease-in-out infinite; transform-origin: center; }
      .floatB { animation: floatB 6.4s ease-in-out infinite; transform-origin: center; }
      .orbit { animation: orbit 14s linear infinite; transform-origin: 1034px 214px; }
      @keyframes floatA {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes floatB {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(8px); }
      }
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <rect width="1280" height="430" rx="34" fill="url(#stackBg)"/>
  <text x="56" y="72" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Tech Stack</text>
  <text x="56" y="110" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">Languages and tools I currently use in projects and coursework</text>

  <text x="56" y="164" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Languages</text>
  <g class="floatA">
    <rect x="56" y="188" width="168" height="58" rx="18" fill="url(#javaGrad)"/>
    <text x="114" y="225" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Java</text>
  </g>
  <g class="floatB">
    <rect x="244" y="188" width="176" height="58" rx="18" fill="url(#pythonGrad)"/>
    <text x="287" y="225" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Python</text>
  </g>
  <g class="floatA">
    <rect x="440" y="188" width="120" height="58" rx="18" fill="#00599C"/>
    <text x="489" y="225" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">C</text>
  </g>
  <g class="floatB">
    <rect x="580" y="188" width="170" height="58" rx="18" fill="url(#kotlinGrad)"/>
    <text x="625" y="225" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Kotlin</text>
  </g>

  <text x="56" y="298" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Tools</text>
  <g class="floatB">
    <rect x="56" y="322" width="236" height="58" rx="18" fill="#16A34A"/>
    <text x="89" y="359" fill="white" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Android Studio</text>
  </g>
  <g class="floatA">
    <rect x="312" y="322" width="188" height="58" rx="18" fill="#0284C7"/>
    <text x="364" y="359" fill="white" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">VS Code</text>
  </g>
  <g class="floatB">
    <rect x="520" y="322" width="118" height="58" rx="18" fill="#F97316"/>
    <text x="563" y="359" fill="white" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Git</text>
  </g>

  <rect x="820" y="70" width="404" height="290" rx="30" fill="#0B1224" stroke="#334155"/>
  <text x="854" y="110" fill="white" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Core Focus</text>
  <text x="854" y="144" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">What I like most in software projects</text>

  <circle cx="1034" cy="222" r="108" fill="#0A1730" stroke="#334155"/>
  <circle cx="1034" cy="222" r="64" fill="#0F203D" stroke="#172554"/>
  <circle cx="1034" cy="222" r="18" fill="#38BDF8"/>
  <text x="986" y="228" fill="white" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Focus</text>

  <g class="orbit">
    <circle cx="1034" cy="114" r="15" fill="#8B5CF6"/>
    <circle cx="1142" cy="222" r="15" fill="#38BDF8"/>
    <circle cx="1034" cy="330" r="15" fill="#22C55E"/>
    <circle cx="926" cy="222" r="15" fill="#F97316"/>
  </g>

  <rect x="850" y="314" width="146" height="18" rx="9" fill="#172554"/>
  <text x="868" y="327" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Android development</text>

  <rect x="1008" y="314" width="118" height="18" rx="9" fill="#0F3D34"/>
  <text x="1032" y="327" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">API work</text>

  <rect x="1136" y="314" width="64" height="18" rx="9" fill="#3B1D6B"/>
  <text x="1152" y="327" fill="#E9D5FF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">UI</text>
</svg>
