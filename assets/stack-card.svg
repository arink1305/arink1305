<svg width="1280" height="430" viewBox="0 0 1280 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stackBg" x1="0" y1="0" x2="1280" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="1" stop-color="#18233F"/>
    </linearGradient>
    <linearGradient id="javaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="pythonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="kotlinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <style>
      .pulseSkill { animation: pulseSkill 6s ease-in-out infinite; transform-origin: center; }
      .floatStack { animation: floatStack 8.5s ease-in-out infinite; transform-origin: center; }
      .floatStack2 { animation: floatStack2 6.8s ease-in-out infinite; transform-origin: center; }
      .orbit { animation: orbit 14s linear infinite; transform-origin: 1032px 220px; }
      @keyframes pulseSkill {
        0%,100% { transform: scale(1); opacity: 0.96; }
        50% { transform: scale(1.03); opacity: 1; }
      }
      @keyframes floatStack {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes floatStack2 {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(8px); }
      }
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <rect width="1280" height="430" rx="34" fill="url(#stackBg)"/>
  <text x="56" y="72" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Tech Stack</text>
  <text x="56" y="112" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">Languages and tools I currently use most in projects and coursework</text>

  <text x="56" y="168" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Languages</text>
  <g class="floatStack">
    <rect x="56" y="194" width="168" height="58" rx="18" fill="url(#javaGrad)"/>
    <text x="114" y="231" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Java</text>
  </g>
  <g class="floatStack2">
    <rect x="244" y="194" width="176" height="58" rx="18" fill="url(#pythonGrad)"/>
    <text x="287" y="231" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Python</text>
  </g>
  <g class="floatStack">
    <rect x="440" y="194" width="120" height="58" rx="18" fill="#00599C"/>
    <text x="489" y="231" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">C</text>
  </g>
  <g class="pulseSkill">
    <rect x="580" y="194" width="170" height="58" rx="18" fill="url(#kotlinGrad)"/>
    <text x="625" y="231" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Kotlin</text>
  </g>

  <text x="56" y="314" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Tools</text>
  <g class="floatStack2">
    <rect x="56" y="338" width="236" height="58" rx="18" fill="#16A34A"/>
    <text x="89" y="375" fill="white" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Android Studio</text>
  </g>
  <g class="floatStack">
    <rect x="312" y="338" width="188" height="58" rx="18" fill="#0284C7"/>
    <text x="364" y="375" fill="white" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">VS Code</text>
  </g>
  <g class="floatStack2">
    <rect x="520" y="338" width="118" height="58" rx="18" fill="#F97316"/>
    <text x="563" y="375" fill="white" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Git</text>
  </g>

  <circle cx="1032" cy="220" r="112" fill="#0A1730" stroke="#334155"/>
  <circle cx="1032" cy="220" r="70" fill="#0F203D" stroke="#172554"/>
  <circle cx="1032" cy="220" r="20" fill="#38BDF8"/>
  <g class="orbit">
    <circle cx="1032" cy="108" r="16" fill="#8B5CF6"/>
    <circle cx="1144" cy="220" r="16" fill="#38BDF8"/>
    <circle cx="1032" cy="332" r="16" fill="#22C55E"/>
    <circle cx="920" cy="220" r="16" fill="#F97316"/>
  </g>
  <text x="956" y="224" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Build</text>
  <text x="930" y="392" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">Focused on practical, project-driven learning</text>
</svg>
