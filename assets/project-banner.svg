    <rect x="980" y="106" width="174" height="82" rx="18" fill="#10213F"/>
    <path d="M1006 162C1026 130 1058 117 1098 117C1124 117 1145 125 1158 137" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
    <path d="M1020 177C1042 149 1072 141 1104 141" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"/>
    <rect x="980" y="202" width="112" height="14" rx="7" fill="#172554"/>
    <rect x="1104" y="202" width="50" height="14" rx="7" fill="#0F3D34"/>
