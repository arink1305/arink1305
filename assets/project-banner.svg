<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="projBg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081225"/>
      <stop offset="0.55" stop-color="#0D2142"/>
      <stop offset="1" stop-color="#123764"/>
    </linearGradient>
    <linearGradient id="waveGradA" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="waveGradB" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <style>
      .waveA { animation: waveA 10s ease-in-out infinite; }
      .waveB { animation: waveB 12s ease-in-out infinite; }
      .floatCard { animation: floatCard 6.2s ease-in-out infinite; transform-origin: center; }
      .floatChip { animation: floatChip 7.4s ease-in-out infinite; transform-origin: center; }
      @keyframes waveA {
        0%,100% { transform: translateX(0px) translateY(0px); }
        50% { transform: translateX(-16px) translateY(7px); }
      }
      @keyframes waveB {
        0%,100% { transform: translateX(0px) translateY(0px); }
        50% { transform: translateX(16px) translateY(-6px); }
      }
      @keyframes floatCard {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes floatChip {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
    </style>
  </defs>

  <rect width="1280" height="320" rx="32" fill="url(#projBg)"/>
  <circle cx="1090" cy="92" r="116" fill="#38BDF8" fill-opacity="0.08"/>
  <circle cx="1188" cy="248" r="102" fill="#8B5CF6" fill-opacity="0.08"/>

  <g class="floatCard">
