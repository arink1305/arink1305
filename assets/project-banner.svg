<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="projBg" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081225"/>
      <stop offset="0.55" stop-color="#0D2142"/>
      <stop offset="1" stop-color="#123764"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <style>
      .waveA { animation: waveA 10s ease-in-out infinite; }
      .waveB { animation: waveB 12s ease-in-out infinite; }
      .floatIcon { animation: floatIcon 6s ease-in-out infinite; transform-origin: center; }
      @keyframes waveA {
        0%,100% { transform: translateX(0px) translateY(0px); }
        50% { transform: translateX(-14px) translateY(6px); }
      }
      @keyframes waveB {
        0%,100% { transform: translateX(0px) translateY(0px); }
        50% { transform: translateX(16px) translateY(-6px); }
      }
      @keyframes floatIcon {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
    </style>
  </defs>

