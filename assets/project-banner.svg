    <path d="M56 234C88 224 118 222 146 222C184 222 212 228 236 238V236H56V234Z" fill="#7DD3FC"/>
    <path d="M86 214C112 204 138 204 168 212C192 218 212 220 232 214" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <text x="86" y="152" fill="#133578" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">Splæsh</text>
    <path d="M190 84C197 58 215 42 228 42C238 42 243 50 242 60C241 74 232 85 232 98C232 108 238 117 250 126C230 126 218 117 214 105C206 108 199 109 193 109C182 109 176 102 176 91C176 81 182 74 191 71C190 75 190 79 190 84Z" fill="#3B82F6"/>
    <circle cx="264" cy="88" r="14" fill="#60A5FA"/>
    <circle cx="278" cy="108" r="10" fill="#60A5FA"/>
  </g>

  <text x="280" y="110" fill="white" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">Splæsh</text>
  <text x="280" y="146" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="21">Android bathing app for Norway</text>
  <text x="280" y="188" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">Weather maps • warnings • UV • point forecasts • recommendations</text>
  <text x="280" y="214" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">and a custom bathing score in one app</text>

  <g class="floatChip">
    <rect x="280" y="236" width="196" height="42" rx="21" fill="#172554"/>
    <text x="334" y="263" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Kotlin + Android</text>
  </g>
  <g class="floatChip">
    <rect x="492" y="236" width="176" height="42" rx="21" fill="#0F3D34"/>
    <text x="539" y="263" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">API Integration</text>
  </g>
  <g class="floatChip">
    <rect x="684" y="236" width="128" height="42" rx="21" fill="#3B1D6B"/>
    <text x="726" y="263" fill="#E9D5FF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">UI / UX</text>
  </g>

  <g class="floatCard">
